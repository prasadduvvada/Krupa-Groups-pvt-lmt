spring.application.name=krupa_backend

# ===================================================================
# SECURITY SETTINGS
# ===================================================================
# Read credentials injected from environment variables (defaults to 'boss' locally)
spring.security.user.name=${ADMIN_USERNAME:boss}
spring.security.user.password=${ADMIN_PASSWORD}

# ===================================================================
# DATABASE CONNECTION (AUTOMATIC LOCAL / NEON CLOUD SWITCH)
# ===================================================================
# If Render environment variables exist, it uses them. Otherwise, defaults to localhost.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:0000000}

# ===================================================================
# HIBERNATE / JPA PERFORMANCE SETTINGS
# ===================================================================
spring.jpa.hibernate.ddl-auto=update

# PERFORMANCE BOOST: Closes database sessions immediately after data is fetched
spring.jpa.open-session-in-view=false

# ===================================================================
# FILE UPLOAD MANAGEMENT (OPTIMIZED TO 5MB)
# ===================================================================
# Restricts single files and entire form requests to a maximum of 5 Megabytes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ===================================================================
# HIKARI CONNECTION POOL OPTIMIZATION (PHASE 2)
# ===================================================================
# Speeds up simple data viewing by auto-committing read transactions
spring.datasource.hikari.auto-commit=true

# Keep at least 2 database connections open, warm, and ready at all times
spring.datasource.hikari.minimum-idle=2

# Maximum connections allowed to open (Perfect ceiling for the Neon free tier)
spring.datasource.hikari.maximum-pool-size=5

# How long a connection can sit completely idle before closing (30 seconds)
spring.datasource.hikari.idle-timeout=30000

# Maximum lifetime of a database connection in the pool before refreshing (30 minutes)
spring.datasource.hikari.max-lifetime=1800000

# How long your app will wait for a database connection before timing out (20 seconds)
spring.datasource.hikari.connection-timeout=20000