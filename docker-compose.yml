version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: krupa-postgres-db
    restart: always
    environment:
      POSTGRES_USER: krupa_admin
      POSTGRES_PASSWORD: KrupaSecurePassword2026
      POSTGRES_DB: krupa_industries
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - krupa-network

  backend:
    build: ./krupa_backend
    container_name: krupa-backend-api
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/krupa_industries
      - SPRING_DATASOURCE_USERNAME=krupa_admin
      - SPRING_DATASOURCE_PASSWORD=KrupaSecurePassword2026
      - SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT=org.hibernate.dialect.PostgreSQLDialect
      # Admin login credentials for your startup dashboard
      - ADMIN_USERNAME=Admin
      - ADMIN_PASSWORD=Karuna@9985
    networks:
      - krupa-network

volumes:
  pg_data:

networks:
  krupa-network:
    driver: bridge